<!DOCTYPE html>
<html>
<head>
<title>Class 11 Maths Test</title>
<style>
body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h1{
text-align:center;
}

.question{
background:white;
padding:15px;
margin:15px 0;
border-radius:10px;
}

button{
padding:10px 20px;
font-size:18px;
margin-top:20px;
}

#leaderboard{
margin-top:40px;
background:white;
padding:20px;
border-radius:10px;
}
</style>
</head>

<body>

<h1>Class 11 Maths Online Test</h1>

<label>Your Name:</label>
<input id="name" type="text">

<form id="quiz"></form>

<button onclick="submitTest()">Submit Test</button>

<h2 id="result"></h2>

<div id="leaderboard">
<h2>Leaderboard</h2>
<ul id="board"></ul>
</div>

<script>

const questions = [

{
q:"If A={1,2,3} and B={2,3,4}, find A∩B",
options:["{1,2}","{2,3}","{3,4}","{1,4}"],
answer:1,
marks:1
},

{
q:"Number of subsets of a set with 5 elements",
options:["10","16","32","25"],
answer:2,
marks:1
},

{
q:"|3+4i| equals",
options:["3","4","5","7"],
answer:2,
marks:1
},

{
q:"Value of 5C2",
options:["5","10","15","20"],
answer:1,
marks:1
},

{
q:"sin²θ + cos²θ equals",
options:["0","1","2","-1"],
answer:1,
marks:1
},

{
q:"tan45° equals",
options:["0","1","√3","-1"],
answer:1,
marks:1
},

{
q:"i⁴ equals",
options:["1","-1","i","0"],
answer:0,
marks:1
},

{
q:"Probability of event complement if P(A)=0.7",
options:["0.7","0.3","1","0"],
answer:1,
marks:1
},

{
q:"Slope of line y=3x+5",
options:["3","5","8","2"],
answer:0,
marks:1
},

{
q:"4! equals",
options:["12","24","16","20"],
answer:1,
marks:1
},

{
q:"Distance between (0,0) and (3,4)",
options:["4","5","6","7"],
answer:1,
marks:1
},

{
q:"Value of cos0°",
options:["0","1","-1","1/2"],
answer:1,
marks:1
},

{
q:"Value of 7C1",
options:["1","7","14","21"],
answer:1,
marks:1
},

{
q:"Number of permutations of 3 objects",
options:["3","6","9","12"],
answer:1,
marks:1
},

{
q:"Value of tan⁻¹(1)",
options:["30°","45°","60°","90°"],
answer:1,
marks:1
},

{
q:"Middle term of AP 2,4,6,8,10",
options:["4","6","8","10"],
answer:1,
marks:1
},

{
q:"Union of A={1,2} and B={2,3}",
options:["{1,2,3}","{1,2}","{2,3}","{1,3}"],
answer:0,
marks:1
},

{
q:"Principal argument of 1+i",
options:["π/4","π/2","π","3π/4"],
answer:0,
marks:1
},

{
q:"Derivative of x²",
options:["2x","x","x²","1"],
answer:0,
marks:1
},

{
q:"Sum of first 5 natural numbers",
options:["10","15","20","25"],
answer:1,
marks:1
},

{
q:"Find 6P2",
options:["15","20","30","36"],
answer:2,
marks:2
},

{
q:"Common difference of AP 3,7,11,15",
options:["2","3","4","5"],
answer:2,
marks:2
},

{
q:"Distance between (1,2) and (4,6)",
options:["3","4","5","6"],
answer:2,
marks:2
},

{
q:"Evaluate 8C2",
options:["28","16","64","12"],
answer:0,
marks:2
},

{
q:"Find slope joining (2,3) and (5,9)",
options:["2","3","4","5"],
answer:1,
marks:2
},

{
q:"Solve x²−5x+6=0",
options:["2,3","1,6","3,4","2,4"],
answer:0,
marks:3
},

{
q:"Sum of first 10 natural numbers",
options:["45","55","65","75"],
answer:1,
marks:3
},

{
q:"Middle term of (1+x)⁶",
options:["15x³","20x³","10x³","6x³"],
answer:1,
marks:3
},

{
q:"Find 7C3",
options:["21","35","42","56"],
answer:1,
marks:3
},

{
q:"Find sum of GP 2+4+8+16",
options:["30","28","32","26"],
answer:0,
marks:3
},

{
q:"Coefficient of x³ in (1+x)⁶",
options:["10","20","15","6"],
answer:1,
marks:3
},

{
q:"Equation of line slope=3 passing through (1,2)",
options:["y=3x-1","y=3x+1","y=2x+1","y=3x+2"],
answer:0,
marks:4
},

{
q:"Area of triangle (1,1)(4,5)(6,2)",
options:["6","7","8","9"],
answer:2,
marks:4
},

{
q:"Find sum of AP 5,9,13,… 10 terms",
options:["200","210","230","250"],
answer:1,
marks:4
},

{
q:"Coefficient of x⁴ in (1+x)⁸",
options:["70","56","28","35"],
answer:0,
marks:5
},

{
q:"Number of ways 6 students sit in row",
options:["120","240","720","360"],
answer:2,
marks:5
},

{
q:"Middle term of (1+x)⁸",
options:["56x⁴","70x⁴","28x⁴","35x⁴"],
answer:1,
marks:5
},

{
q:"Probability of head in fair coin",
options:["1","0.5","0.25","2"],
answer:1,
marks:5
}

];

const quiz=document.getElementById("quiz");

questions.forEach((q,i)=>{

let div=document.createElement("div");
div.className="question";

div.innerHTML=`<p>${i+1}. ${q.q}</p>`;

q.options.forEach((opt,j)=>{

div.innerHTML+=`
<label>
<input type="radio" name="q${i}" value="${j}">
${opt}
</label><br>
`;

});

quiz.appendChild(div);

});

function submitTest(){

let score=0;

questions.forEach((q,i)=>{

let ans=document.querySelector(`input[name=q${i}]:checked`);

if(ans && parseInt(ans.value)===q.answer){
score+=q.marks;
}

});

document.getElementById("result").innerText="Score: "+score;

let name=document.getElementById("name").value || "Anonymous";

let board=JSON.parse(localStorage.getItem("board"))||[];

board.push({name,score});

board.sort((a,b)=>b.score-a.score);

localStorage.setItem("board",JSON.stringify(board));

showBoard();

}

function showBoard(){

let board=JSON.parse(localStorage.getItem("board"))||[];

let ul=document.getElementById("board");

ul.innerHTML="";

board.slice(0,10).forEach(p=>{

let li=document.createElement("li");

li.innerText=p.name+" - "+p.score;

ul.appendChild(li);

});

}

showBoard();

</script>

</body>
</html>
