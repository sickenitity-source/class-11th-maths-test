<!DOCTYPE html>
<html>
<head>

<title>Class 11 Maths Test</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h1{
text-align:center;
}

.question{
background:white;
padding:15px;
margin:15px 0;
border-radius:10px;
}

button{
padding:12px 20px;
font-size:18px;
margin-top:20px;
}

#leaderboard{
margin-top:40px;
background:white;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Class 11 Maths Test</h1>

<label>Enter Name:</label>
<input id="name" type="text">

<form id="quiz"></form>

<button onclick="submitTest()">Submit Test</button>

<h2 id="result"></h2>

<div id="leaderboard">

<h2>Leaderboard</h2>

<ol id="board"></ol>

</div>

<script>

const questions=[

{q:"Value of 5C2",options:["5","10","15","20"],answer:1,marks:1},

{q:"sin²θ + cos²θ =",options:["0","1","2","-1"],answer:1,marks:1},

{q:"|3+4i| =",options:["3","4","5","7"],answer:2,marks:1},

{q:"tan45° =",options:["0","1","√3","-1"],answer:1,marks:1},

{q:"i⁴ =",options:["1","-1","i","0"],answer:0,marks:1},

{q:"4! =",options:["12","24","16","20"],answer:1,marks:1},

{q:"Distance between (0,0) and (3,4)",options:["4","5","6","7"],answer:1,marks:1},

{q:"cos0° =",options:["0","1","-1","1/2"],answer:1,marks:1},

{q:"Value of 7C1",options:["1","7","14","21"],answer:1,marks:1},

{q:"Derivative of x²",options:["2x","x","x²","1"],answer:0,marks:1},

{q:"Find 6P2",options:["15","20","30","36"],answer:2,marks:2},

{q:"Common difference of AP 3,7,11",options:["2","3","4","5"],answer:2,marks:2},

{q:"Distance between (1,2) and (4,6)",options:["3","4","5","6"],answer:2,marks:2},

{q:"Evaluate 8C2",options:["28","16","64","12"],answer:0,marks:2},

{q:"Slope joining (2,3) and (5,9)",options:["2","3","4","5"],answer:1,marks:2},

{q:"Solve x²−5x+6=0",options:["2,3","1,6","3,4","2,4"],answer:0,marks:3},

{q:"Sum of first 10 natural numbers",options:["45","55","65","75"],answer:1,marks:3},

{q:"Find 7C3",options:["21","35","42","56"],answer:1,marks:3},

{q:"Coefficient of x³ in (1+x)⁶",options:["10","20","15","6"],answer:1,marks:3},

{q:"Ways to arrange 6 students",options:["120","240","720","360"],answer:2,marks:5}

];

const quiz=document.getElementById("quiz");

questions.forEach((q,i)=>{

let div=document.createElement("div");

div.className="question";

div.innerHTML=`<p>${i+1}. ${q.q}</p>`;

q.options.forEach((opt,j)=>{

div.innerHTML+=`
<label>
<input type="radio" name="q${i}" value="${j}">
${opt}
</label><br>
`;

});

quiz.appendChild(div);

});

function submitTest(){

let score=0;

questions.forEach((q,i)=>{

let ans=document.querySelector(`input[name=q${i}]:checked`);

if(ans && parseInt(ans.value)===q.answer){

score+=q.marks;

}

});

document.getElementById("result").innerText="Score: "+score;

saveScore(score);

}

function saveScore(score){

let name=document.getElementById("name").value || "Anonymous";

let board=JSON.parse(localStorage.getItem("leaderboard"))||[];

board.push({name,score});

board.sort((a,b)=>b.score-a.score);

localStorage.setItem("leaderboard",JSON.stringify(board));

showBoard();

}

function showBoard(){

let board=JSON.parse(localStorage.getItem("leaderboard"))||[];

let list=document.getElementById("board");

list.innerHTML="";

board.slice(0,10).forEach(player=>{

let li=document.createElement("li");

li.textContent=player.name+" - "+player.score;

list.appendChild(li);

});

}

showBoard();

</script>

</body>
</html>
